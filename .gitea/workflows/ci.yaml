name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  test:
    runs-on: docker-ci
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/pip install -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Test
        run: .venv/bin/pytest -q
