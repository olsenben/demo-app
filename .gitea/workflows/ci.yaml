name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  test:
    runs-on: docker-ci
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
